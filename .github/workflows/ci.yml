name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Set up ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run PHP syntax checks
        run: scripts/php-lint.sh

      - name: Verify source-only repository
        run: scripts/check-source-only.sh

      - name: Verify tracked file modes
        run: scripts/check-file-modes.sh

      - name: Verify public JavaScript assets parse
        run: scripts/check-assets.sh

      - name: Verify video media rendering
        run: php scripts/check-video-support.php
